# ============================================================
# Docker Compose — Kelarin App (Team Ethereal)
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:16-alpine
    container_name: db-kelarin
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgpg
      POSTGRES_DB: kelarin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kelarin-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kelarin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dwialsha/kelarin:backend-v2  # Tag image kamu
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    networks:
      - kelarin-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    image: dwialsha/kelarin:frontend-v1  # Tag image kamu
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - kelarin-net
    depends_on:
      - backend

# ==================== VOLUMES ====================
volumes:
  pgdata:
    name: kelarin-pgdata

# ==================== NETWORKS ====================
networks:
  kelarin-net:
    name: kelarin-net
    driver: bridge